<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的GitHub项目导航 v20260427.1540</title>
  <!-- Font Awesome 图标库 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }

    body {
      background: linear-gradient(145deg, #f5f7fc 0%, #eef1f8 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px 16px;
    }

    .container {
      max-width: 1200px;
      width: 100%;
    }

    /* 头部区域 */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .avatar {
      width: 96px;
      height: 96px;
      background: white;
      border-radius: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 12px 24px -8px rgba(0, 20, 60, 0.15);
      border: 2px solid rgba(255,255,255,0.8);
    }

    .avatar i {
      font-size: 48px;
      color: #3a4f6d;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 650;
      color: #1e293b;
      letter-spacing: -0.01em;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #5e718d;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .subtitle i {
      color: #5b6cf7;
      opacity: 0.8;
    }

    .github-link {
      color: #3a4f6d;
      text-decoration: none;
      font-weight: 500;
      background: rgba(255,255,255,0.6);
      padding: 6px 16px;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.8);
      transition: 0.2s;
    }

    .github-link:hover {
      background: white;
      box-shadow: 0 6px 12px -6px rgba(0,0,0,0.1);
    }

    /* 标签筛选栏 */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
      margin: 20px 0 24px 0;
    }

    .filter-btn {
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(200, 210, 230, 0.6);
      color: #4a5f7a;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
    }

    .filter-btn:hover {
      background: white;
      border-color: #a0b3d9;
    }

    .filter-btn.active {
      background: #3a4f6d;
      border-color: #3a4f6d;
      color: white;
      box-shadow: 0 4px 8px rgba(58, 79, 109, 0.15);
    }

    /* 项目卡片网格 */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }

    .project-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(8px);
      border-radius: 28px;
      padding: 28px 24px;
      border: 1px solid rgba(255,255,255,0.9);
      box-shadow: 0 16px 32px -12px rgba(0, 20, 40, 0.08);
      transition: all 0.25s ease;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      cursor: pointer;
    }

    .project-card:hover {
      transform: translateY(-4px);
      background: white;
      box-shadow: 0 24px 40px -16px rgba(27, 50, 90, 0.15);
      border-color: #cdd9f0;
    }

    .card-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #5b6cf7 0%, #8296ff 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 22px;
      color: white;
      font-size: 28px;
      box-shadow: 0 10px 18px -6px rgba(91, 108, 247, 0.3);
    }

    .project-title {
      font-size: 1.5rem;
      font-weight: 650;
      color: #0f1a2e;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .project-title i {
      font-size: 1rem;
      color: #5b6cf7;
      opacity: 0.7;
      transition: transform 0.2s;
    }

    .project-card:hover .project-title i {
      transform: translateX(4px);
    }

    .project-desc {
      color: #44566c;
      line-height: 1.5;
      font-size: 0.95rem;
      margin-bottom: 16px;
      flex: 1;
    }

    .project-tag {
      display: inline-block;
      background: #e6ebf5;
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #2e4a7c;
      letter-spacing: 0.2px;
      align-self: flex-start;
    }

    /* 版本号样式 */
    .version-badge {
      font-size: 0.75rem;
      font-weight: 500;
      background: #eef2ff;
      color: #5b6cf7;
      padding: 2px 8px;
      border-radius: 30px;
      margin-left: 4px;
    }

    .version-badge.unknown {
      background: #f0f0f0;
      color: #888;
    }

    /* 页脚 */
    .footer {
      margin-top: 56px;
      text-align: center;
      color: #62748c;
      font-size: 0.9rem;
    }

    .footer a {
      color: #3f5b8c;
      text-decoration: none;
      font-weight: 500;
    }

    /* 移动端优化 */
    @media (max-width: 640px) {
      h1 { font-size: 1.9rem; }
      .projects-grid { gap: 18px; }
      .project-card { padding: 22px 20px; }
      .avatar { width: 80px; height: 80px; border-radius: 24px; }
      .avatar i { font-size: 40px; }
      
      .card-icon {
        display: none;
      }

      .filter-bar {
        margin: 16px 0 20px 0;
      }
      .filter-btn {
        font-size: 0.7rem;
        padding: 5px 12px;
      }
      
      .project-title {
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <!-- 头部 -->
  <div class="header">
    <div class="avatar">
      <i class="fas fa-code-branch"></i>
    </div>
    <h1>我的项目实验室</h1>
    <div class="subtitle">
      <span id="projectCountText"><i class="far fa-folder-open"></i> 6 个开源项目</span>
      <span>·</span>
      <a class="github-link" href="#" target="_blank" id="githubProfileLink">
        <i class="fab fa-github"></i> GitHub 主页
      </a>
    </div>
  </div>

  <!-- 标签筛选栏 -->
  <div class="filter-bar" id="filterBar"></div>

  <!-- 项目卡片网格 -->
  <div class="projects-grid" id="projectsGrid">
    <!-- 初始加载中提示（很快会被替换） -->
    <div style="grid-column:1/-1; text-align:center; padding:40px; color:#7f8fa3;">
      <i class="fas fa-spinner fa-pulse"></i> 加载项目中...
    </div>
  </div>

  <!-- 页脚 -->
  <div class="footer">
    <p>✨ 点击卡片直接访问项目 · <a href="#" id="footerRepoLink">页面源码</a> ✨</p>
    <p style="margin-top: 16px; opacity: 0.7;">Made with <i class="fas fa-heart" style="color: #e05b6c;"></i> for GitHub</p>
  </div>
</div>

<script>
  (function() {
    // ---------- 项目配置 ----------
    const githubUsername = "fengerh";
    const projects = [
      {
        name: "📒 标签笔记",
        description: "标签化笔记管理 · 支持导入导出与编辑，移动端适配。",
        url: "https://fengerh.github.io/Label_notebook/",
        versionUrl: "https://fengerh.github.io/Label_notebook/index.html",  // 新增：版本获取地址
        icon: "fa-pen-fancy",
        tag: "效率工具"
      },
      {
        name: "🧾 旅行账本",
        description: "旅行账本应用，支持多人AA与本地存储，移动端适配。",
        url: "https://fengerh.github.io/travelAA_BILL/",
        versionUrl: "https://fengerh.github.io/travelAA_BILL/index.html",
        icon: "fa-wallet",
        tag: "效率工具"
      },
      
      {
        name: "📈 基金组合回测",
        description: "基金组合模拟回测工具，基于多个基金的净值测算，需要先准备基础数据。",
        url: "https://fengerh.github.io/DCA_backtesting/",
        versionUrl: "https://fengerh.github.io/DCA_backtesting/index.html",
        icon: "fa-calculator",
        tag: "投资演示"
      },
      {
        name: "🧮 川麻记账",
        description: "用于记录川麻游戏的得分和统计。",
        url: "https://fengerh.github.io/chuanma_BILL/",
        versionUrl: "https://fengerh.github.io/chuanma_BILL/index.html",
        icon: "fa-gamepad",
        tag: "游戏工具"
      },
      {
        name: "🀄️ 川麻练习",
        description: "根据手牌计算川麻听牌和练习，支持多种牌型和规则。",
        url: "https://fengerh.github.io/chuanma_TEST/",
        versionUrl: "https://fengerh.github.io/chuanma_TEST/index.html",
        icon: "fa-chess-queen",
        tag: "游戏工具"
      },
      
      {
        name: "🃏 干瞪眼记分",
        description: "基于手牌和规则的记分器。",
        url: "https://fengerh.github.io/gandengyan_BILL/",
        versionUrl: "https://fengerh.github.io/gandengyan_BILL/index.html",
        icon: "fa-dice",
        tag: "游戏工具"
      },
      {
        name: "🧾 信用卡管理",
        description: "信用卡管理应用，支持本地存储，移动端暂未适配。",
        url: "https://fengerh.github.io/creditcard_BILL/",
        versionUrl: "https://fengerh.github.io/creditcard_BILL/index.html",
        icon: "fa-wallet",
        tag: "效率工具"
      }
      // 新增项目示例：
      // {
      //   name: "🍅 番茄钟",
      //   description: "简洁的番茄工作法计时器",
      //   url: "https://fengerh.github.io/pomodoro/",
      //   versionUrl: "https://fengerh.github.io/pomodoro/index.html",
      //   icon: "fa-clock",
      //   tag: "效率工具"
      // }
    ];

    // 当前选中的标签（默认全部）
    let currentTag = "全部";

    // ---------- 提取版本号 ----------
    // 从<title>中提取版本号，格式如 "中文名称 v20260410.1100"
    function extractVersionFromTitle(title) {
      const match = title.match(/v(\d{8}\.\d{4})/);
      return match ? match[1] : null;
    }

    // 获取单个项目的版本号
    async function fetchProjectVersion(versionUrl) {
      try {
        // 加时间戳避免缓存
        const url = `${versionUrl}?_t=${Date.now()}`;
        const response = await fetch(url);
        if (!response.ok) return null;
        
        const html = await response.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const title = doc.querySelector('title')?.textContent || '';
        
        return extractVersionFromTitle(title);
      } catch (error) {
        console.warn(`获取版本失败: ${versionUrl}`, error);
        return null;
      }
    }

    // 批量获取所有项目的版本号，返回 projects 的深拷贝并附加 version 字段
    async function fetchAllVersions() {
      const promises = projects.map(async (project) => {
        if (!project.versionUrl) return { ...project, version: null };
        const version = await fetchProjectVersion(project.versionUrl);
        return { ...project, version };
      });
      return Promise.all(promises);
    }

    // ---------- 标签筛选相关 ----------
    function getUniqueTags(projectsData) {
      const tags = projectsData.map(p => p.tag);
      return ["全部", ...new Set(tags)];
    }

    // 根据当前标签过滤（projectsData 已经包含版本信息）
    function getFilteredProjects(projectsData) {
      if (currentTag === "全部") {
        return projectsData;
      }
      return projectsData.filter(p => p.tag === currentTag);
    }

    // ---------- 渲染筛选按钮 ----------
    function renderFilterBar(projectsData) {
      const filterBar = document.getElementById('filterBar');
      const tags = getUniqueTags(projectsData);
      let html = '';
      tags.forEach(tag => {
        const activeClass = tag === currentTag ? 'active' : '';
        html += `<button class="filter-btn ${activeClass}" data-tag="${tag}">${tag}</button>`;
      });
      filterBar.innerHTML = html;
    }

    // ---------- 渲染卡片（带版本号） ----------
    function renderCards(projectsData) {
      const grid = document.getElementById('projectsGrid');
      const filtered = getFilteredProjects(projectsData);
      
      // 更新项目计数
      const countSpan = document.getElementById('projectCountText');
      countSpan.innerHTML = `<i class="far fa-folder-open"></i> ${filtered.length} 个项目`;

      if (filtered.length === 0) {
        grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px; color:#7f8fa3;">✨ 这个标签下暂时没有项目</div>`;
        return;
      }

      let html = '';
      filtered.forEach(proj => {
        const versionHtml = proj.version 
          ? `<span class="version-badge">v${proj.version}</span>`
          : `<span class="version-badge unknown">版本未知</span>`;
        
        html += `
          <a class="project-card" href="${proj.url}" target="_blank" rel="noopener noreferrer">
            <div class="card-icon">
              <i class="fas ${proj.icon}"></i>
            </div>
            <div class="project-title">
              ${proj.name}
              ${versionHtml}
              <i class="fas fa-arrow-right"></i>
            </div>
            <div class="project-desc">${proj.description}</div>
            <span class="project-tag">${proj.tag}</span>
          </a>
        `;
      });
      grid.innerHTML = html;
    }

    // ---------- 整体渲染（异步获取版本后） ----------
    async function renderAll() {
      // 先显示加载状态（已经在 HTML 中预置了）
      
      // 获取所有项目的版本号
      const projectsWithVersions = await fetchAllVersions();
      
      // 渲染筛选栏和卡片
      renderFilterBar(projectsWithVersions);
      renderCards(projectsWithVersions);
    }

    // ---------- 事件监听：标签点击切换（重新获取版本？不用，我们已经有了 projectsWithVersions，但当前实现需要缓存） ----------
    // 为了在切换标签时不用重新 fetch，我们把带版本的数据存在全局变量里
    let cachedProjectsWithVersions = null;

    async function init() {
      cachedProjectsWithVersions = await fetchAllVersions();
      renderFilterBar(cachedProjectsWithVersions);
      renderCards(cachedProjectsWithVersions);
      
      // 监听标签切换
      document.addEventListener('click', function(e) {
        const btn = e.target.closest('.filter-btn');
        if (!btn) return;
        const tag = btn.getAttribute('data-tag');
        if (tag) {
          currentTag = tag;
          if (cachedProjectsWithVersions) {
            renderFilterBar(cachedProjectsWithVersions);  // 更新 active 状态
            renderCards(cachedProjectsWithVersions);
          }
        }
      });
    }

    // ---------- 设置 GitHub 链接 ----------
    function setLinks() {
      const profileLink = document.getElementById('githubProfileLink');
      const footerRepoLink = document.getElementById('footerRepoLink');
      if (githubUsername && githubUsername !== '你的GitHub用户名') {
        profileLink.href = `https://github.com/${githubUsername}`;
        footerRepoLink.href = `https://github.com/${githubUsername}/${githubUsername}.github.io`;
      } else {
        profileLink.href = "#";
        footerRepoLink.href = "#";
        profileLink.addEventListener('click', (e) => { e.preventDefault(); alert('请在代码中设置你的 GitHub 用户名'); });
      }
    }

    // ---------- 启动 ----------
    setLinks();
    init();
  })();
</script>
</body>
</html>
